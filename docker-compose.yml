services:
  ocr:
    build:
      context: .
      dockerfile: Dockerfile
    image: ocr-service:latest
    container_name: ocr-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${OCR_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
